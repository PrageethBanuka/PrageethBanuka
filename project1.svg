<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 230" width="380" height="230">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur" />
    </filter>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.01)" />
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <circle cx="40" cy="40" r="70" fill="rgba(56, 189, 248, 0.5)" filter="url(#glow)" />
  <circle cx="340" cy="190" r="80" fill="rgba(99, 102, 241, 0.4)" filter="url(#glow)" />

  <rect x="15" y="15" width="350" height="200" rx="20" ry="20" fill="url(#glassGradient)" stroke="url(#borderGradient)" stroke-width="1.5" filter="url(#shadow)" />

  <g transform="translate(34, 38) scale(1.3)">
    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="75" y="56" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5px">FastRoboEyes</text>
    
    <text x="40" y="94" font-size="14" font-weight="600" fill="#e5e7eb">High-Performance Rendering Engine</text>
    
    <text x="40" y="128" font-size="13" fill="#9ca3af" font-weight="400">Hardware-optimized animation</text>
    <text x="40" y="148" font-size="13" fill="#9ca3af" font-weight="400">pipeline built for robotics platforms.</text>
    
    <rect x="40" y="170" width="45" height="24" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>\n    <text x="62.5" y="186" font-size="11" font-weight="600" fill="#e5e7eb" text-anchor="middle">C++</text>\n    <rect x="95" y="170" width="60" height="24" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>\n    <text x="125.0" y="186" font-size="11" font-weight="600" fill="#e5e7eb" text-anchor="middle">Python</text>\n    
  </g>
</svg>