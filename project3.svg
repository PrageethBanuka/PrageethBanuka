<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 230" width="380" height="230">
  <defs>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.01)" />
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)" />
    </linearGradient>
  </defs>

  <!-- Clear Glass Panel Only -->
  <rect x="15" y="15" width="350" height="200" rx="20" ry="20" fill="url(#glassGradient)" stroke="url(#borderGradient)" stroke-width="1.5" />

  <g transform="translate(34, 38) scale(1.3)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h20" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="75" y="56" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5px">SDN Testbed</text>
    
    <text x="40" y="94" font-size="14" font-weight="600" fill="#e5e7eb">Software Defined Networking</text>
    
    <text x="40" y="128" font-size="13" fill="#9ca3af" font-weight="400">Experimental SDN environment</text>
    <text x="40" y="148" font-size="13" fill="#9ca3af" font-weight="400">on Raspberry Pi clusters.</text>
    
    <rect x="40" y="170" width="50" height="24" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>\n    <text x="65.0" y="186" font-size="11" font-weight="600" fill="#e5e7eb" text-anchor="middle">Linux</text>\n    <rect x="100" y="170" width="70" height="24" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>\n    <text x="135.0" y="186" font-size="11" font-weight="600" fill="#e5e7eb" text-anchor="middle">Network</text>\n    
  </g>
</svg>