<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="100%">
  <defs>
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

      /* ── Animations ───────────────────────────── */
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes fadeUp {
        0%   { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandX {
        to { transform: scaleX(1); }
      }
      @keyframes chipSlide {
        0%   { opacity: 0; transform: translateX(-10px); }
        100% { opacity: 1; transform: translateX(0); }
      }

      /* ── Glass Morphism & Ambient Layers ───────── */
      @keyframes ambientGlow1 {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.4; }
        50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.6; }
      }
      @keyframes ambientGlow2 {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
        50% { transform: scale(1.2) translate(-30px, 10px); opacity: 0.5; }
      }

      .glow-orb-1 {
        fill: rgba(56, 189, 248, 0.4); /* Cyan glow */
        filter: blur(50px);
        transform-origin: center;
        animation: ambientGlow1 8s ease-in-out infinite;
      }
      .glow-orb-2 {
        fill: rgba(99, 102, 241, 0.3); /* Indigo glow */
        filter: blur(60px);
        transform-origin: center;
        animation: ambientGlow2 10s ease-in-out infinite reverse;
      }

      /* ── Glass Panel ───────────────────────────── */
      .glass-card {
        fill: rgba(255, 255, 255, 0.03);
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 1px;
        backdrop-filter: blur(16px);
      }

      /* ── Text ────────────────────────────────────── */
      .name {
        font-family: 'Inter', sans-serif;
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -2px;
        fill: #ffffff;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      }
      .divider {
        transform-origin: center;
        transform: scaleX(0);
        animation: expandX 0.7s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
      }
      .subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 4.5px;
        fill: #9ca3af;
        opacity: 0;
        animation: fadeIn 0.8s ease 1.05s forwards;
      }
      
      /* ── Glass Chips ───────────────────────────── */
      .chip-bg { 
        fill: rgba(255, 255, 255, 0.05); 
        stroke: rgba(255, 255, 255, 0.15); 
        stroke-width: 1px; 
      }
      .chip-icon {
        stroke: #38BDF8;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chip-text {
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.8px;
        fill: #e5e7eb;
      }
      
      .c1 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.25s forwards; }
      .c2 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.35s forwards; }
      .c3 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.45s forwards; }
      .c4 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.55s forwards; }
      ]]>
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="900" height="260" fill="#050505"/>

  <!-- Ambient Glow Effects -->
  <circle class="glow-orb-1" cx="200" cy="80" r="140" />
  <circle class="glow-orb-2" cx="700" cy="180" r="160" />

  <!-- Main Glassmorphic Panel -->
  <rect x="50" y="30" width="800" height="200" rx="32" class="glass-card"/>

  <!-- Inner Subtle Borders -->
  <rect x="51" y="31" width="798" height="198" rx="31" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ── NAME ── -->
  <text class="name" x="450" y="118" text-anchor="middle">Banuka Rajapaksha</text>

  <!-- ── DIVIDER ── -->
  <line class="divider" x1="320" y1="133" x2="580" y2="133" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ── SUBTITLE ── -->
  <text class="subtitle" x="450" y="156" text-anchor="middle">COMPUTER ENGINEERING · AI · SYSTEMS</text>

  <!-- ── CHIPS (Total Width: 125+85+90+100 + (3*20 margin) = 460. Panel width = 900. Offset = (900-460)/2 = 220) ── -->

  <!-- Dist x=220 -->
  <g transform="translate(220, 184)">
    <g class="c1">
      <rect width="125" height="28" rx="8" class="chip-bg"/>
      <path class="chip-icon" d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" transform="translate(6, 4) scale(0.85)"/>
      <text class="chip-text" x="32" y="18">DISTRIBUTED</text>
    </g>
  </g>

  <!-- AI x=220+125+20=365 -->
  <g transform="translate(365, 184)">
    <g class="c2">
      <rect width="85" height="28" rx="8" class="chip-bg"/>
      <path class="chip-icon" d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6M18 19l4-4-4-4M6 5L2 9l4 4" transform="translate(6, 4) scale(0.85)"/>
      <text class="chip-text" x="30" y="18">AI / ML</text>
    </g>
  </g>

  <!-- DevOps x=365+85+20=470 -->
  <g transform="translate(470, 184)">
    <g class="c3">
      <rect width="90" height="28" rx="8" class="chip-bg"/>
      <path class="chip-icon" d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z M12 3v18 M3 12h18 M12 12v5" transform="translate(6, 4) scale(0.85)"/>
      <text class="chip-text" x="30" y="18">DEVOPS</text>
    </g>
  </g>

  <!-- Robotics x=470+90+20=580 -->
  <g transform="translate(580, 184)">
    <g class="c4">
      <rect width="100" height="28" rx="8" class="chip-bg"/>
      <path class="chip-icon" d="M12 8V4H8M12 8h4V4 M4 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z M20 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z M15 13v2 M9 13v2 M12 20v-2" transform="translate(6, 4) scale(0.85)"/>
      <circle cx="12" cy="14" r="5" class="chip-icon" transform="translate(6, 4) scale(0.85)"/>
      <text class="chip-text" x="34" y="18">ROBOTICS</text>
    </g>
  </g>

</svg>
