<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="100%">
  <defs>
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

      /* ── Animations ───────────────────────────── */
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes fadeUp {
        0%   { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandX {
        to { transform: scaleX(1); }
      }
      @keyframes chipSlide {
        0%   { opacity: 0; transform: translateX(-10px); }
        100% { opacity: 1; transform: translateX(0); }
      }

      /* ── Glass Morphism & Ambient Layers ───────── */
      @keyframes ambientGlow1 {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.4; }
        50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.6; }
      }
      @keyframes ambientGlow2 {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
        50% { transform: scale(1.2) translate(-30px, 10px); opacity: 0.5; }
      }

      .glow-orb-1 {
        fill: rgba(56, 189, 248, 0.4); /* Cyan glow */
        filter: blur(50px);
        transform-origin: center;
        animation: ambientGlow1 8s ease-in-out infinite;
      }
      .glow-orb-2 {
        fill: rgba(99, 102, 241, 0.3); /* Indigo glow */
        filter: blur(60px);
        transform-origin: center;
        animation: ambientGlow2 10s ease-in-out infinite reverse;
      }

      /* ── Glass Panel ───────────────────────────── */
      .glass-card {
        fill: rgba(255, 255, 255, 0.03);
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 1px;
        backdrop-filter: blur(16px);
      }

      /* ── Text ────────────────────────────────────── */
      .name {
        font-family: 'Inter', sans-serif;
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -2px;
        fill: #ffffff;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      }
      .divider {
        transform-origin: center;
        transform: scaleX(0);
        animation: expandX 0.7s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
      }
      .subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 4.5px;
        fill: #9ca3af;
        opacity: 0;
        animation: fadeIn 0.8s ease 1.05s forwards;
      }
      
      /* ── Glass Chips ───────────────────────────── */
      .chip-bg { 
        fill: rgba(255, 255, 255, 0.05); 
        stroke: rgba(255, 255, 255, 0.15); 
        stroke-width: 1px; 
      }
      .chip-icon {
        stroke: #38BDF8;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chip-text {
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.8px;
        fill: #e5e7eb;
      }
      
      .c1 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.25s forwards; }
      .c2 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.35s forwards; }
      .c3 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.45s forwards; }
      .c4 { opacity:0; animation: chipSlide 0.5s cubic-bezier(0.16,1,0.3,1) 1.55s forwards; }
      ]]>
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="900" height="260" fill="#050505"/>

  <!-- Ambient Glow Effects -->
  <circle class="glow-orb-1" cx="200" cy="80" r="140" />
  <circle class="glow-orb-2" cx="700" cy="180" r="160" />

  <!-- Main Glassmorphic Panel -->
  <rect x="50" y="30" width="800" height="200" rx="32" class="glass-card"/>

  <!-- Inner Subtle Borders -->
  <rect x="51" y="31" width="798" height="198" rx="31" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ── NAME ── -->
  <text class="name" x="450" y="118" text-anchor="middle">Banuka Rajapaksha</text>

  <!-- ── DIVIDER ── -->
  <line class="divider" x1="320" y1="133" x2="580" y2="133" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ── SUBTITLE ── -->
  <text class="subtitle" x="450" y="156" text-anchor="middle">COMPUTER ENGINEERING · AI · SYSTEMS</text>

  <!-- ── CHIPS (Total Width 495. Offset 203) ── -->

  <!-- Dist x=203 -->
  <g transform="translate(203, 184)">
    <g class="c1">
      <rect width="130" height="28" rx="8" class="chip-bg"/>
      <g class="chip-icon" transform="translate(12, 4) scale(0.85)">
        <path d="m13.7 13.7 2.6-2.6"/><path d="m10.3 10.3-2.6-2.6"/><path d="m13.7 10.3 2.6 2.6"/><path d="m10.3 13.7-2.6 2.6"/><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/>
      </g>
      <text class="chip-text" x="81" y="18" text-anchor="middle">DISTRIBUTED</text>
    </g>
  </g>

  <!-- AI x=203+130+20=353 -->
  <g transform="translate(353, 184)">
    <g class="c2">
      <rect width="100" height="28" rx="8" class="chip-bg"/>
      <g class="chip-icon" transform="translate(12, 4) scale(0.85)">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>
      </g>
      <text class="chip-text" x="66" y="18" text-anchor="middle">AI / ML</text>
    </g>
  </g>

  <!-- DevOps x=353+100+20=473 -->
  <g transform="translate(473, 184)">
    <g class="c3">
      <rect width="95" height="28" rx="8" class="chip-bg"/>
      <g class="chip-icon" transform="translate(12, 4) scale(0.85)">
        <path d="M12 12c-2-2.67-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.33 6-4Zm0 0c2 2.67 4 4 6 4a4 4 0 1 0 0-8c-2 0-4 1.33-6 4Z"/>
      </g>
      <text class="chip-text" x="63.5" y="18" text-anchor="middle">DEVOPS</text>
    </g>
  </g>

  <!-- Robotics x=473+95+20=588 -->
  <g transform="translate(588, 184)">
    <g class="c4">
      <rect width="110" height="28" rx="8" class="chip-bg"/>
      <g class="chip-icon" transform="translate(12, 4) scale(0.85)">
        <path d="M12 8V4H8"/><path d="M12 8h4V4"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
      </g>
      <text class="chip-text" x="71" y="18" text-anchor="middle">ROBOTICS</text>
    </g>
  </g>

</svg>
